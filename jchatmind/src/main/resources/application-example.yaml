spring:
  application:
    name: jchatmind
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:150MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:150MB}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jchatmind}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY}
      base-url: ${ZHIPUAI_BASE_URL:https://open.bigmodel.cn/api/paas}
      chat:
        options:
          model: ${ZHIPUAI_MODEL:glm-4.6}

mybatis:
  type-aliases-package: com.kama.jchatmind.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.kama.jchatmind.typehandler

document:
  storage:
    base-path: ${DOCUMENT_STORAGE_BASE_PATH:./data/documents}

rag:
  document-converter:
    markitdown-command: ${MARKITDOWN_COMMAND:markitdown}
    timeout-seconds: ${MARKITDOWN_TIMEOUT_SECONDS:60}
    max-file-size-mb: ${RAG_DOCUMENT_MAX_FILE_SIZE_MB:150}
    enabled-formats: ${RAG_DOCUMENT_ENABLED_FORMATS:md,markdown,txt,pdf,docx,pptx,xlsx,html,csv,json,xml}
  chunking:
    max-chars: ${RAG_CHUNKING_MAX_CHARS:1200}
    overlap-chars: ${RAG_CHUNKING_OVERLAP_CHARS:150}
    min-chars: ${RAG_CHUNKING_MIN_CHARS:80}
  retrieval:
    raw-top-k: ${RAG_RETRIEVAL_RAW_TOP_K:20}
    final-top-k: ${RAG_RETRIEVAL_FINAL_TOP_K:3}
    max-distance: ${RAG_RETRIEVAL_MAX_DISTANCE:}
    max-chunks-per-document: ${RAG_RETRIEVAL_MAX_CHUNKS_PER_DOCUMENT:2}
    debug-enabled: ${RAG_RETRIEVAL_DEBUG_ENABLED:true}
  rerank:
    enabled: ${RAG_RERANK_ENABLED:true}
    strategy: ${RAG_RERANK_STRATEGY:bge-reranker}
    vector-weight: ${RAG_RERANK_VECTOR_WEIGHT:0.70}
    lexical-weight: ${RAG_RERANK_LEXICAL_WEIGHT:0.30}
    fallback-enabled: ${RAG_RERANK_FALLBACK_ENABLED:true}
    bge:
      endpoint: ${RAG_RERANK_BGE_ENDPOINT:http://localhost:8001/rerank}
      model: ${RAG_RERANK_BGE_MODEL:BAAI/bge-reranker-v2-m3}
      timeout-ms: ${RAG_RERANK_BGE_TIMEOUT_MS:3000}
