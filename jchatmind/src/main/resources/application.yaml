spring:
  application:
    name: jchatmind
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jchatmind}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY:}
      base-url: ${ZHIPUAI_BASE_URL:https://open.bigmodel.cn/api/paas}
      chat:
        options:
          model: ${ZHIPUAI_MODEL:glm-4.6}
mybatis:
  type-aliases-package: com.kama.jchatmind.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.kama.jchatmind.typehandler

document:
  storage:
    base-path: ./data/documents

rag:
  document-converter:
    markitdown-command: ${MARKITDOWN_COMMAND:markitdown}
    timeout-seconds: ${MARKITDOWN_TIMEOUT_SECONDS:60}
    max-file-size-mb: ${RAG_DOCUMENT_MAX_FILE_SIZE_MB:30}
    enabled-formats: ${RAG_DOCUMENT_ENABLED_FORMATS:md,markdown,txt,pdf,docx,pptx,xlsx,html,csv,json,xml}
  retrieval:
    raw-top-k: ${RAG_RETRIEVAL_RAW_TOP_K:10}
    final-top-k: ${RAG_RETRIEVAL_FINAL_TOP_K:3}
    max-distance: ${RAG_RETRIEVAL_MAX_DISTANCE:}
    max-chunks-per-document: ${RAG_RETRIEVAL_MAX_CHUNKS_PER_DOCUMENT:2}
    debug-enabled: ${RAG_RETRIEVAL_DEBUG_ENABLED:true}
