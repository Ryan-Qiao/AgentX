services:
  searxng:
    image: searxng/searxng:latest
    container_name: agentx-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./deploy/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng
    environment:
      SEARXNG_BASE_URL: http://localhost:8081/
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 5s
      timeout: 3s
      retries: 12

  web-search-mcp:
    build:
      context: ./deploy/mcp-searxng
    image: agentx/mcp-searxng:1.11.0
    container_name: agentx-web-search-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      SEARXNG_URL: http://searxng:8080
      MCP_HTTP_PORT: "3000"
      MCP_HTTP_HOST: 0.0.0.0
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  searxng-cache:
